server:
  port: 8081
spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  application:
    name: enrollment-service
  datasource:
    url: jdbc:mysql://localhost:3306/enrollment?useSSL=false&serverTimezone=UTC
#    url: jdbc:mysql://host.docker.internal:3306/enrollment?useSSL=false&serverTimezone=UTC
#    url: jdbc:mysql://select-mysql-service-svc:3306/enrollment?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
#        server-addr: nacos-headless:8848 # Nacos服务器地址
#        server-addr: nacos-headless.select-course.svc.cluster.local:8848 # Nacos服务器地址
        server-addr: localhost:8848 # Nacos服务器地址
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.enrollmentservice.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印SQL语句
    map-underscore-to-camel-case: false