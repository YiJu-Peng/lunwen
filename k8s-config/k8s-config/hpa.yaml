apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: select-course-select-hpa
  namespace: select-course
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: select-course-select
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 20  # 当 CPU 平均使用率超过 80% 时触发扩容