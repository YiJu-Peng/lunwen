apiVersion: apps/v1
kind: Deployment
metadata:
  name: select-course-select
  labels:
    app: select-course-select
spec:
  replicas: 1
  selector:
    matchLabels:
      app: select-course-select
  template:
    metadata:
      labels:
        app: select-course-select
    spec:
      containers:
        - name: select-course-select
          image: select-course:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
      imagePullSecrets:
        - name: regcred  # 如果使用私有镜像仓库，需要配置拉取密钥